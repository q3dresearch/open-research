site_name: q3d Open Research
site_description: Autonomous research pipeline over public open datasets
site_url: https://q3dresearch.github.io/open-research
repo_url: https://github.com/q3dresearch/open-research
repo_name: q3dresearch/open-research

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Phases: phases.md
  - Guides:
      - Running Locally: guides/running-locally.md
      - Loading Datasets: guides/loading-datasets.md
      - Human Notes: guides/human-notes.md
  - Reference:
      - Artifacts: reference/artifacts.md
      - Phase Registry: reference/phase-registry.md
      - Prompts: reference/prompts.md
